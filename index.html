<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#C8A84B" />
  <meta name="description" content="古王国からプトレマイオス朝まで、3000年の歴史を学ぶアプリ" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="エジプト" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- OGP -->
  <meta property="og:title" content="Sands of Time" />
  <meta property="og:description" content="古代エジプト3000年の歴史学習アプリ" />
  <meta property="og:type" content="website" />

  <title>Sands of Time — 古代エジプト</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0e0c07;
      color: #e8d8b8;
      font-family: 'Georgia', serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    #root { min-height: 100vh; }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0e0c07;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.6s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash svg { animation: splashPulse 1.8s ease-in-out infinite; }
    #splash p {
      font-family: 'Cinzel', serif;
      color: #C8A84B;
      font-size: 13px;
      letter-spacing: 0.2em;
      opacity: 0.7;
    }
    @keyframes splashPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.97); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    /* Safe area for notch/nav bar */
    .safe-top    { padding-top:    env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <svg width="72" height="44" viewBox="0 0 100 60" fill="none">
    <ellipse cx="50" cy="30" rx="40" ry="24" stroke="#C8A84B" stroke-width="2.5" fill="none"/>
    <circle cx="50" cy="30" r="10" fill="#C8A84B" opacity="0.9"/>
    <circle cx="50" cy="30" r="5" fill="#0e0c07"/>
    <path d="M10 30 Q30 6 50 8 Q70 6 90 30" stroke="#C8A84B" stroke-width="2" fill="none"/>
    <path d="M40 40 L35 56 M50 43 L50 58 M60 40 L65 56" stroke="#C8A84B" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <p>SANDS OF TIME</p>
</div>

<div id="root"></div>

<!-- React + Babel (CDN, no build needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Main app -->
<script type="text/babel" src="/App.js" data-type="module"></script>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW failed:', err));
  });
}

// Hide splash when React mounts
window.__hideSplash = () => {
  const splash = document.getElementById('splash');
  if (splash) {
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 700);
  }
};
</script>

</body>
</html>
